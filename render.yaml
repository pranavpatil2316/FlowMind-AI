services:
  - type: web
    name: flowmind-ai-backend
    env: python
    repo: https://github.com/your-username/flowmind-ai # Update this with your repository URL
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard env panel
      - key: PORT
        value: 8000
